version: "1"

package:
  id: cn.ticktick.task
  name: 滴答清单
  version: 8.0.10.0
  kind: app
  description: |
    滴答清单（TickTick）是一款功能强大的跨平台任务管理应用, 这是其Linux原生版本

base: org.deepin.base/25.2.2
runtime: null
command:
  - "/opt/apps/cn.ticktick.task/files/bin/cn.ticktick.task"

sources:
  - kind: file
    url: https://cdn.dida365.cn/download/linux/linux_deb_arm64/dida-8.0.10-arm64.deb
    digest: 3b2e7b8372d93d54e061458549208c2d65020c626df2c2090ce98ca67cffefa3

build: |
  ## 环境设置
  set -x
  SOURCES="linglong/app-sources"
  export PATH=$PATH:/usr/libexec/linglong/builder/helper
  BINNAME=${LINGLONG_APPID}
  cd ${SOURCES}

  # 清理旧的安装包文件
  rm -rf target.deb ${LINGLONG_APPID}

  # 移动安装包至此处
  cp ../sources/*.deb ./target.deb

  # 解包deb并拷贝出应用本体
  dpkg-deb -R ./target.deb deb
  mv ./deb/opt/dida ./${LINGLONG_APPID}

  # 删除多余目录与安装包
  rm -rf ./deb ./target.deb

  # 写入启动脚本
  echo "#!/bin/bash" > bin/${BINNAME}
  echo "exec \"${PREFIX}/${LINGLONG_APPID}/dida\" \"--no-sandbox\" \"\$@\"" >> bin/${BINNAME}
  chmod +x bin/*

  # 进行安装
  cp -a bin $PREFIX
  cp -a ${LINGLONG_APPID} $PREFIX
  cp -a share $PREFIX
